<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1b4332;--green-mid:#2d6a4f;--green-soft:#40916c;
  --gold:#c9a84c;--gold-light:#e9c46a;
  --canvas:#f4f2ed;--surface:#fff;--border:#e2ddd4;
  --text:#1a1a1a;--text-mid:#4a4a4a;--text-soft:#8a8782;
  --bottom-h:62px;
}
html,body{height:100%}
body{background:var(--canvas);color:var(--text);font-family:"Inter",sans-serif;display:flex;flex-direction:column;min-height:100vh;padding-bottom:var(--bottom-h)}

/* HEADER */
.hdr{background:var(--green);position:sticky;top:0;z-index:300;box-shadow:0 2px 16px rgba(0,0,0,0.25);flex-shrink:0}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:54px;gap:12px}
.hdr-left{display:flex;align-items:center;gap:10px}
.menu-tog{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s}
.menu-tog:hover{background:rgba(255,255,255,0.14)}
.hdr-brand{display:flex;align-items:center;gap:9px;text-decoration:none}
.hdr-logo{width:34px;height:34px;border-radius:50%;object-fit:contain;border:2px solid rgba(201,168,76,0.45);background:rgba(255,255,255,0.08);flex-shrink:0}
.hdr-logo-fb{width:34px;height:34px;border-radius:50%;background:rgba(201,168,76,0.15);border:2px solid rgba(201,168,76,0.4);display:none;align-items:center;justify-content:center;flex-shrink:0}
.hdr-name{font-family:"Playfair Display",Georgia,serif;font-size:0.95rem;font-weight:700;color:#fff}
.hdr-sub{font-size:0.58rem;color:var(--gold);font-weight:600;letter-spacing:0.12em;text-transform:uppercase;margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-search-btn{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.75);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.hdr-search-btn:hover{background:rgba(255,255,255,0.14);color:#fff}
.hdr-rule{height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-light) 40%,transparent)}

/* APP BODY */
.app-body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:248px;background:var(--green);flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.1) transparent}
.sb-search{padding:12px 10px 8px;position:relative}
.sb-search-ic{position:absolute;left:20px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.3);pointer-events:none}
#search-input{width:100%;padding:8px 10px 8px 30px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:rgba(255,255,255,0.9);font-family:"Inter",sans-serif;font-size:0.8rem;outline:none;transition:all 0.2s}
#search-input::placeholder{color:rgba(255,255,255,0.28)}
#search-input:focus{background:rgba(255,255,255,0.11);border-color:var(--gold)}
.sb-lbl{font-size:0.57rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.25);padding:10px 14px 5px}
.dept-nav{padding:0 6px 20px}
.dept-row{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:8px;cursor:pointer;transition:all 0.15s;position:relative;margin-bottom:1px}
.dept-row:hover{background:rgba(255,255,255,0.07)}
.dept-row.active{background:rgba(201,168,76,0.14)}
.dept-row.active::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:56%;background:var(--gold);border-radius:0 3px 3px 0}
.dept-ic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:rgba(255,255,255,0.7)}
.dept-row.active .dept-ic{color:#fff}
.dept-tx{flex:1;min-width:0}
.dept-nm{font-size:0.8rem;font-weight:500;color:rgba(255,255,255,0.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dept-row.active .dept-nm{color:#fff;font-weight:600}
.dept-prog{height:2px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:3px;overflow:hidden}
.dept-prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 0.5s ease}
.dept-ct{font-size:0.65rem;color:rgba(255,255,255,0.25);font-weight:500}
.dept-row.active .dept-ct{color:var(--gold)}
.sb-div{height:1px;background:rgba(255,255,255,0.07);margin:4px 14px 6px}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:18px 16px 32px}

/* HERO */
.hero{background:var(--green);border-radius:14px;padding:20px 22px;margin-bottom:16px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;right:-20px;top:-20px;width:140px;height:140px;border-radius:50%;background:rgba(201,168,76,0.05);pointer-events:none}
.hero-badge{font-size:0.58rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.hero-title{font-family:"Playfair Display",Georgia,serif;font-size:1.35rem;font-weight:700;color:#fff;line-height:1.2;margin-bottom:5px}
.hero-desc{font-size:0.76rem;color:rgba(255,255,255,0.48);line-height:1.6;max-width:320px;margin-bottom:14px}
.hero-stats{display:flex;gap:18px;margin-bottom:16px}
.hs-val{font-family:"Playfair Display",Georgia,serif;font-size:1.3rem;font-weight:700;color:var(--gold);line-height:1}
.hs-lbl{font-size:0.58rem;color:rgba(255,255,255,0.35);margin-top:3px;text-transform:uppercase;letter-spacing:0.07em}

/* TOOLS STRIP */
.tools-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;border-top:1px solid rgba(255,255,255,0.08);padding-top:14px}
.tool-card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 6px;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all 0.15s;cursor:pointer}
.tool-card:hover{background:rgba(255,255,255,0.12);border-color:rgba(201,168,76,0.3)}
.tool-card:active{transform:scale(0.96)}
.tool-ic{width:36px;height:36px;border-radius:9px;background:rgba(201,168,76,0.12);display:flex;align-items:center;justify-content:center;color:var(--gold)}
.tool-nm{font-size:0.6rem;font-weight:600;color:rgba(255,255,255,0.7);letter-spacing:0.04em;text-align:center;line-height:1.2}

/* NEW BADGE */
.new-badge{background:var(--gold);color:#111;font-size:0.55rem;font-weight:800;padding:1px 5px;border-radius:4px;letter-spacing:0.05em;vertical-align:middle;margin-left:4px}

/* SECTION HEAD */
.sec-head{margin-bottom:12px}
.sec-eyebrow{font-size:0.57rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-soft);margin-bottom:4px}
.sec-title{font-family:"Playfair Display",Georgia,serif;font-size:clamp(1.1rem,3vw,1.6rem);font-weight:700;color:var(--green);line-height:1.15;margin-bottom:6px}

/* PROGRESS */
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.prog-wrap{flex:1;height:4px;background:var(--border);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--green-soft),var(--gold));border-radius:99px;transition:width 0.5s cubic-bezier(0.34,1.2,0.64,1)}
.prog-lbl{font-size:0.68rem;color:var(--text-soft);white-space:nowrap;font-weight:500}
.prog-lbl strong{color:var(--green)}

/* FILTER BAR */
.fbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.fpills{display:flex;gap:5px}
.fpill{padding:5px 12px;border-radius:99px;border:1px solid var(--border);background:var(--surface);font-family:"Inter",sans-serif;font-size:0.7rem;font-weight:600;color:var(--text-mid);cursor:pointer;transition:all 0.15s}
.fpill:hover{border-color:var(--green);color:var(--green)}
.fpill.active{background:var(--green);border-color:var(--green);color:#fff}
.fpill.active-pdf{background:#5b21b6;border-color:#5b21b6;color:#fff}
.fcount{font-size:0.7rem;color:var(--text-soft);font-weight:500}

/* COURSE CARDS */
.cards-grid{display:flex;flex-direction:column;gap:8px}
.course-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 15px;transition:all 0.2s;animation:cardIn 0.3s ease both;text-decoration:none;color:inherit;display:block}
.course-card:hover{border-color:var(--green-soft);box-shadow:0 5px 20px rgba(27,67,50,0.1);transform:translateY(-1px)}
.course-card.viewed{border-left:3px solid var(--green-soft)}
@keyframes cardIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.card-top{display:flex;align-items:flex-start;gap:11px;margin-bottom:10px}
.card-ic{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-ic.html{background:rgba(27,67,50,0.08);color:var(--green-mid)}
.card-ic.pdf{background:rgba(91,33,182,0.07);color:#5b21b6}
.card-meta{flex:1;min-width:0}
.card-code{font-size:0.62rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin-bottom:2px}
.card-code.no-code{color:var(--text-soft)}
.card-title{font-size:0.92rem;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-info{display:flex;align-items:center;gap:8px;font-size:0.68rem;color:var(--text-soft)}
.card-tag{padding:2px 7px;border-radius:4px;font-size:0.6rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase}
.card-tag.html{background:rgba(27,67,50,0.07);color:var(--green-soft)}
.card-tag.pdf{background:rgba(91,33,182,0.07);color:#5b21b6}
.card-viewed{display:none;align-items:center;gap:3px;font-size:0.63rem;color:var(--green-soft);font-weight:600}
.course-card.viewed .card-viewed{display:flex}
.card-bottom{display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-prog-wrap{flex:1;height:3px;background:var(--border);border-radius:99px;overflow:hidden}
.card-prog-fill{height:100%;background:linear-gradient(90deg,var(--green-soft),var(--gold));border-radius:99px}
.card-btn{padding:6px 15px;border-radius:7px;font-family:"Inter",sans-serif;font-size:0.72rem;font-weight:700;border:none;cursor:pointer;transition:all 0.15s;text-decoration:none;display:inline-block;flex-shrink:0}
.card-btn.html{background:var(--green);color:#fff}
.card-btn.html:hover{background:var(--green-mid)}
.card-btn.pdf{background:#5b21b6;color:#fff}
.card-btn.pdf:hover{background:#4c1d95}
.grp-lbl{font-size:0.6rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-soft);display:flex;align-items:center;gap:10px;padding:10px 0 4px}
.grp-lbl::after{content:"";flex:1;height:1px;background:var(--border)}

/* STATES */
.state-box{text-align:center;padding:48px 20px}
.state-box svg{margin:0 auto 12px;display:block;opacity:0.3}
.state-box p{font-size:0.85rem;color:var(--text-soft);line-height:1.7}
.spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--bottom-h);background:var(--green);border-top:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:space-around;z-index:400;box-shadow:0 -4px 20px rgba(0,0,0,0.2)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 10px;border-radius:10px;text-decoration:none;color:rgba(255,255,255,0.4);transition:all 0.15s;border:none;background:transparent;cursor:pointer;font-family:"Inter",sans-serif;position:relative}
.nav-item.active{color:#fff}
.nav-ic-wrap{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center}
.nav-item.active .nav-ic-wrap{background:rgba(201,168,76,0.2)}
.nav-lbl{font-size:0.52rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase}
.nav-dot{position:absolute;top:6px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--gold);border:2px solid var(--green);display:none}
.nav-dot.show{display:block}

@media(max-width:700px){
  .sidebar{position:fixed;top:0;left:0;bottom:var(--bottom-h);z-index:200;transform:translateX(-100%);transition:transform 0.25s ease;padding-top:57px}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,0.3)}
  .main{padding:14px 12px 28px}
  .tools-strip{gap:6px}
}
@media(min-width:701px){
  .bottom-nav{display:none}
  body{padding-bottom:0}
  .menu-tog{display:none}
  .main{padding:22px 28px 40px}
}
</style>
</head>

const GITHUB_REPO = "Computer-department-courses-note";

const CACHE_TTL = 20 * 60 * 1000; // 20 minutes — avoids hammering GitHub's 60/hr unauthenticated API limit

const DEPTS = [

  {key:"physics",           name:"Physics",

  {key:"mathematics",       name:"Mathematics",

let allFiles=[], activeDept=null, activeFilter="all";
let viewed = new Set(JSON.parse(localStorage.getItem("fce-viewed")||"[]"));
let lastVisit = parseInt(localStorage.getItem("fce-last-visit")||"0");
const saveViewed = () => localStorage.setItem("fce-viewed", JSON.stringify([...viewed]));

function isNew(file){
  if(!file.sha) return false;
  // use 7-day window from last visit check
  const now = Date.now();
  const sevenDays = NEW_DAYS * 24 * 60 * 60 * 1000;
  return (now - lastVisit) < sevenDays && lastVisit > 0
    ? false
    : false; // rely on commit date from API below
}

function parsePath(path){
  const parts = path.split("/");
  const dept  = parts.length > 1 ? parts[0] : "__root__";
  const fname = parts[parts.length-1];
  const ext   = fname.split(".").pop().toLowerCase();
  const noExt = fname.replace(/\.(html|pdf)$/i,"");
  const m = noExt.match(/^([A-Za-z]{2,4}\s?[-_]?\d{3}[A-Za-z]?)\s*[-_]?\s*(.*)/);
  let code="", title="";
  if(m){
    code  = m[1].replace(/[-_]/g," ").toUpperCase().trim();
    title = m[2].replace(/[-_]/g," ").replace(/\w/g,c=>c.toUpperCase()).trim();
  } else {
    title = noExt.replace(/[-_]/g," ").replace(/\w/g,c=>c.toUpperCase());
  }
  if(!title) title = noExt;
  return {code, title, ext, dept};
}

function isExcluded(path){
  const fname = path.split("/").pop().toLowerCase();
  return EXCLUDE.some(e => fname===e) ||
         fname==="draft" ||
         fname.startsWith("draft") ||
         path.startsWith("tools/");
}

function deptFiles(key){ return allFiles.filter(f => parsePath(f.path).dept===key); }
function deptProg(key){
  const files=deptFiles(key), total=files.length;
  if(!total) return {viewed:0,total:0,pct:0};
  const v = files.filter(f=>viewed.has(f.path)).length;
  return {viewed:v, total, pct:Math.round(v/total*100)};
}

function isNewFile(file){
  if(!file.committed_date) return false;
  const age = Date.now() - new Date(file.committed_date).getTime();
  return age < NEW_DAYS * 24 * 60 * 60 * 1000;
}

// --- simple localStorage cache helpers ---
// GitHub's unauthenticated API allows only 60 requests/hour per IP.
// Caching here means repeat visits (or reloads while testing) reuse
// the same data instead of burning through that limit.
function cacheGet(key){
  try{
    const raw = localStorage.getItem(key);
    if(!raw) return null;
    const {t, v} = JSON.parse(raw);
    if(Date.now() - t > CACHE_TTL) return null;
    return v;
  }catch(e){ return null; }
}
function cacheSet(key, v){
  try{ localStorage.setItem(key, JSON.stringify({t:Date.now(), v})); }catch(e){}
}

async function fetchMaterials(){
  const cached = cacheGet("fce-cache-tree");
  if(cached){
    allFiles = cached;
    checkNewFiles();
    onLoaded();
    return;
  }
  try{
    // Use commits API to get file dates
    const r = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/git/trees/main?recursive=1`);
    if(!r.ok) throw new Error(r.status);
    const d = await r.json();
    allFiles = (d.tree||[]).filter(f =>
      f.type==="blob" &&
      (f.path.endsWith(".html")||f.path.endsWith(".pdf")) &&
      !isExcluded(f.path)
    );
    if(!allFiles.length){ await fetchFlat(); return; }
    cacheSet("fce-cache-tree", allFiles);
    checkNewFiles();
    onLoaded();
  }catch(e){
    // API failed (rate limit, network, etc) — fall back to a stale
    // cache if we have one, rather than showing an error right away.
    try{
      const raw = localStorage.getItem("fce-cache-tree");
      const stale = raw ? JSON.parse(raw).v : null;
      if(stale && stale.length){ allFiles = stale; onLoaded(); return; }
    }catch(_){}
    try{ await fetchFlat(); }catch(_){ showError(); }
  }
}

async function fetchFlat(){
  const cached = cacheGet("fce-cache-flat");
  if(cached){ allFiles = cached; onLoaded(); return; }
  const r = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
  if(!r.ok) throw new Error(r.status);
  const items = await r.json();
  allFiles = items
    .filter(f => f.type==="file" && (f.name.endsWith(".html")||f.name.endsWith(".pdf")) && !isExcluded(f.name))
    .map(f => ({path:f.name, html_url:f.html_url, download_url:f.download_url}));
  cacheSet("fce-cache-flat", allFiles);
  onLoaded();
}

async function checkNewFiles(){
  // Check commits for recent files and show updates dot
  const cached = cacheGet("fce-cache-commits");
  if(cached){ applyCommitInfo(cached); return; }
  try{
    const r = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/commits?per_page=10`);
    if(!r.ok) return;
    const commits = await r.json();
    cacheSet("fce-cache-commits", commits);
    applyCommitInfo(commits);
  }catch(e){}
}

function applyCommitInfo(commits){
  const lastSeen = parseInt(localStorage.getItem("fce-last-seen")||"0");
  const newest = commits[0]?.commit?.committer?.date;
  if(newest){
    const newestTime = new Date(newest).getTime();
    if(newestTime > lastSeen){
      document.getElementById("updates-dot").classList.add("show");
    }
  }
}

    const htmlF = files.filter(f=>f.path.endsWith(".html"));
    const pdfF  = files.filter(f=>f.path.endsWith(".pdf"));

      if(!group.length) return "";

  main.querySelectorAll(".fpill").forEach(b => b.onclick=()=>{ activeFilter=b.dataset.f; renderMain(); });
  main.querySelectorAll(".course-card").forEach(card => {

      if(path){
        viewed.add(path); saveViewed(); card.classList.add("viewed");
        const fill = card.querySelector(".card-prog-fill"); if(fill) fill.style.width="100%";
        renderSidebar();
        if(activeDept){ const p=deptProg(activeDept); const pf=document.querySelector(".prog-fill"); const pl=document.querySelector(".prog-lbl strong"); if(pf) pf.style.width=p.pct+"%"; if(pl) pl.textContent=p.viewed; }
      }

  });
}
