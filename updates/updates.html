<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Updates &mdash; Learning Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1b4332;--green-mid:#2d6a4f;--green-soft:#40916c;
  --gold:#c9a84c;--gold-light:#e9c46a;
  --canvas:#f4f2ed;--surface:#fff;--border:#e2ddd4;
  --text:#1a1a1a;--text-mid:#4a4a4a;--text-soft:#8a8782;
  --bottom-h:62px;
}
html,body{height:100%;font-family:"Inter",sans-serif;background:var(--canvas);color:var(--text)}
body{display:flex;flex-direction:column;min-height:100vh;padding-bottom:var(--bottom-h)}

/* HEADER */
.hdr{background:var(--green);position:sticky;top:0;z-index:300;box-shadow:0 2px 16px rgba(0,0,0,0.25);flex-shrink:0}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:54px;gap:10px}
.hdr-left{display:flex;align-items:center;gap:10px}
.back-btn{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:background 0.15s;flex-shrink:0}
.hdr-title{font-size:0.95rem;font-weight:600;color:#fff}
.hdr-sub{font-size:0.58rem;color:var(--gold);font-weight:600;letter-spacing:0.12em;text-transform:uppercase;margin-top:1px}
.hdr-rule{height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-light) 40%,transparent)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:16px 16px 32px}

/* TABS */
.tab-row{display:flex;gap:6px;margin-bottom:16px}
.tab{padding:7px 16px;border-radius:8px;font-size:0.76rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-mid);transition:all 0.15s}
.tab.active{background:var(--green);border-color:var(--green);color:#fff}

/* SECTION LABEL */
.sec-lbl{font-size:0.62rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-soft);display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sec-lbl::after{content:"";flex:1;height:1px;background:var(--border)}

/* UPDATE CARD */
.update-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:9px;animation:cardIn 0.3s ease both;text-decoration:none;color:inherit;display:block;transition:all 0.18s}
.update-card:hover{border-color:var(--green-soft);box-shadow:0 4px 18px rgba(27,67,50,0.1);transform:translateY(-1px)}
.update-card.assignment{border-left:3px solid var(--gold)}
.update-card.new-material{border-left:3px solid var(--green-soft)}
@keyframes cardIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
.card-type-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:0.6rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;flex-shrink:0}
.card-type-badge.assignment{background:rgba(201,168,76,0.12);color:#92660a}
.card-type-badge.new-material{background:rgba(64,145,108,0.1);color:var(--green-soft)}
.new-badge{background:var(--gold);color:#111;font-size:0.55rem;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:0.06em;flex-shrink:0}

.card-title{font-size:0.92rem;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.3}
.card-meta{display:flex;align-items:center;gap:10px;font-size:0.7rem;color:var(--text-soft)}
.card-dept{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;background:rgba(27,67,50,0.06);color:var(--green-mid);font-size:0.65rem;font-weight:600}

.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.open-btn{padding:5px 14px;border-radius:7px;font-family:"Inter",sans-serif;font-size:0.7rem;font-weight:700;border:none;cursor:pointer;transition:all 0.15s;text-decoration:none;display:inline-block}
.open-btn.html{background:var(--green);color:#fff}
.open-btn.pdf{background:#5b21b6;color:#fff}
.open-btn.html:hover{background:var(--green-mid)}
.open-btn.pdf:hover{background:#4c1d95}

/* EMPTY / LOADING */
.state-box{text-align:center;padding:48px 20px}
.state-box p{font-size:0.85rem;color:var(--text-soft);line-height:1.7}
.spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* STATS STRIP */
.stats-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat-val{font-family:"Playfair Display",Georgia,serif;font-size:1.3rem;font-weight:700;color:var(--green)}
.stat-lbl{font-size:0.62rem;color:var(--text-soft);margin-top:2px;text-transform:uppercase;letter-spacing:0.07em}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--bottom-h);background:var(--green);border-top:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:space-around;z-index:400;box-shadow:0 -4px 20px rgba(0,0,0,0.2)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 10px;border-radius:10px;text-decoration:none;color:rgba(255,255,255,0.4);transition:all 0.15s;border:none;background:transparent;cursor:pointer;font-family:"Inter",sans-serif;position:relative}
.nav-item.active{color:#fff}
.nav-ic-wrap{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center}
.nav-item.active .nav-ic-wrap{background:rgba(201,168,76,0.2)}
.nav-lbl{font-size:0.52rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase}

@media(min-width:701px){
  .bottom-nav{display:none}
  body{padding-bottom:0}
  .main{padding:24px 32px 40px;max-width:680px;margin:0 auto;width:100%}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-inner">
    <div class="hdr-left">
      <a class="back-btn" href="../index.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <div>
        <div class="hdr-title">Updates</div>
        <div class="hdr-sub">Learning Hub</div>
      </div>
    </div>
  </div>
  <div class="hdr-rule"></div>
</header>

<main class="main">

  <!-- STATS -->
  <div class="stats-strip">
    <div class="stat-card">
      <div class="stat-val" id="stat-new">0</div>
      <div class="stat-lbl">New This Week</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-assignments">0</div>
      <div class="stat-lbl">Assignments</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-total">0</div>
      <div class="stat-lbl">Total Updates</div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tab-row">
    <button class="tab active" data-f="all" onclick="setFilter('all',this)">All</button>
    <button class="tab" data-f="assignments" onclick="setFilter('assignments',this)">Assignments</button>
    <button class="tab" data-f="materials" onclick="setFilter('materials',this)">New Materials</button>
  </div>

  <div id="updates-list">
    <div class="state-box"><div class="spinner"></div><p>Checking for updates...</p></div>
  </div>

</main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a class="nav-item" href="../index.html">
    <div class="nav-ic-wrap">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <span class="nav-lbl">Home</span>
  </a>
  <a class="nav-item" href="calculator.html">
    <div class="nav-ic-wrap">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/>
        <line x1="8" y1="10" x2="8" y2="10" stroke-width="3"/><line x1="12" y1="10" x2="12" y2="10" stroke-width="3"/><line x1="16" y1="10" x2="16" y2="10" stroke-width="3"/>
        <line x1="8" y1="14" x2="8" y2="14" stroke-width="3"/><line x1="12" y1="14" x2="12" y2="14" stroke-width="3"/><line x1="16" y1="14" x2="16" y2="14" stroke-width="3"/>
        <line x1="8" y1="18" x2="8" y2="18" stroke-width="3"/><line x1="12" y1="18" x2="12" y2="18" stroke-width="3"/><line x1="16" y1="18" x2="16" y2="18" stroke-width="3"/>
      </svg>
    </div>
    <span class="nav-lbl">Calc</span>
  </a>
  <a class="nav-item" href="timetable.html">
    <div class="nav-ic-wrap">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </div>
    <span class="nav-lbl">Timetable</span>
  </a>
  <a class="nav-item active" href="updates.html">
    <div class="nav-ic-wrap">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    <span class="nav-lbl">Updates</span>
  </a>
  <a class="nav-item" href="study.html">
    <div class="nav-ic-wrap">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>
    <span class="nav-lbl">Study</span>
  </a>
</nav>

<script>
const GITHUB_USER = "nasirbello043-sudo";
const GITHUB_REPO = "Computer-department-courses-note";
const NEW_DAYS    = 7;

const DEPT_FOLDERS = [
  "computer-science","biology","physics","mathematics",
  "english","business","political-science","agriculture",
  "general-courses","updates"
];

const DEPT_NAMES = {
  "computer-science":"Computer Science","biology":"Biology",
  "physics":"Physics","mathematics":"Mathematics","english":"English",
  "business":"Business","political-science":"Political Science",
  "agriculture":"Agriculture","general-courses":"General Courses",
  "updates":"Assignments & Updates"
};

let allUpdates  = [];
let activeFilter = "all";

function isNew(dateStr){
  if(!dateStr) return false;
  return (Date.now() - new Date(dateStr).getTime()) < NEW_DAYS * 24 * 60 * 60 * 1000;
}

function parseName(fname){
  const noExt = fname.replace(/\.(html|pdf)$/i,"");
  const m = noExt.match(/^([A-Za-z]{2,4}\s?[-_]?\d{3}[A-Za-z]?)\s*[-_]?\s*(.*)/);
  if(m){
    const code  = m[1].replace(/[-_]/g," ").toUpperCase().trim();
    const title = m[2].replace(/[-_]/g," ").replace(/\w/g,c=>c.toUpperCase()).trim();
    return {code, title: title||noExt};
  }
  return {code:"", title: noExt.replace(/[-_]/g," ").replace(/\w/g,c=>c.toUpperCase())};
}

function timeAgo(dateStr){
  if(!dateStr) return "Unknown date";
  const diff = Date.now() - new Date(dateStr).getTime();
  const m = Math.floor(diff/60000);
  if(m < 60)  return m <= 1 ? "Just now" : m+"m ago";
  const h = Math.floor(m/60);
  if(h < 24)  return h+"h ago";
  const d = Math.floor(h/24);
  if(d < 7)   return d+" day"+(d>1?"s":"")+" ago";
  return new Date(dateStr).toLocaleDateString("en-NG",{day:"numeric",month:"short",year:"numeric"});
}

async function fetchUpdates(){
  try{
    // Fetch full tree with dates via commits
    const treeRes = await fetch(
      `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/git/trees/main?recursive=1`
    );
    if(!treeRes.ok) throw new Error(treeRes.status);
    const treeData = await treeRes.json();
    const files = (treeData.tree||[]).filter(f =>
      f.type === "blob" &&
      (f.path.endsWith(".html") || f.path.endsWith(".pdf")) &&
      !f.path.split("/").pop().toLowerCase().startsWith("draft") &&
      !f.path.toLowerCase().endsWith("index.html")
    );

    // Get recent commits to find file dates
    const commitsRes = await fetch(
      `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/commits?per_page=50`
    );
    const commits = commitsRes.ok ? await commitsRes.json() : [];

    // Build a map of filename -> commit date from recent commits
    const dateMap = {};
    for(const commit of commits){
      const date = commit.commit?.committer?.date;
      if(!date) continue;
      // get files changed in this commit
      try{
        const detailRes = await fetch(commit.url);
        if(!detailRes.ok) continue;
        const detail = await detailRes.json();
        (detail.files||[]).forEach(f => {
          if(!dateMap[f.filename]) dateMap[f.filename] = date;
        });
      }catch(e){ continue; }
    }

    // Build updates list
    allUpdates = files.map(f => {
      const parts   = f.path.split("/");
      const folder  = parts.length > 1 ? parts[0] : "__root__";
      const fname   = parts[parts.length-1];
      const ext     = fname.split(".").pop().toLowerCase();
      const parsed  = parseName(fname);
      const date    = dateMap[f.path] || null;
      const type    = folder === "updates" ? "assignment" : "new-material";
      return {
        path: f.path,
        fname, ext, folder,
        code: parsed.code,
        title: parsed.title,
        dept: DEPT_NAMES[folder] || folder,
        date,
        type,
        isNew: isNew(date),
        url: `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${f.path}`
      };
    }).filter(f => f.date) // only show files we have dates for
      .sort((a,b) => new Date(b.date) - new Date(a.date)); // newest first

    updateStats();
    renderList();

    // Save last seen time
    localStorage.setItem("fce-last-seen", Date.now().toString());
  }catch(e){
    document.getElementById("updates-list").innerHTML =
      `<div class="state-box"><p>Could not load updates.<br>Check your internet connection.</p></div>`;
  }
}

function updateStats(){
  const newCount    = allUpdates.filter(f => f.isNew).length;
  const assignments = allUpdates.filter(f => f.type==="assignment").length;
  document.getElementById("stat-new").textContent        = newCount;
  document.getElementById("stat-assignments").textContent = assignments;
  document.getElementById("stat-total").textContent       = allUpdates.length;
}

function setFilter(f, el){
  activeFilter = f;
  document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b.dataset.f===f));
  renderList();
}

function renderList(){
  const list = document.getElementById("updates-list");
  let items = allUpdates;
  if(activeFilter === "assignments") items = items.filter(f => f.type==="assignment");
  if(activeFilter === "materials")   items = items.filter(f => f.type==="new-material");

  if(!items.length){
    list.innerHTML = `<div class="state-box">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="margin:0 auto 12px;display:block;opacity:0.3">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>No updates found yet.<br>Upload files to the <strong>updates/</strong> folder or any department folder.</p>
    </div>`;
    return;
  }

  // Group by NEW vs older
  const newItems  = items.filter(f => f.isNew);
  const oldItems  = items.filter(f => !f.isNew);

  let html = "";

  if(newItems.length){
    html += `<div class="sec-lbl">This Week &mdash; ${newItems.length} new</div>`;
    newItems.forEach((f,i) => html += buildCard(f,i));
  }

  if(oldItems.length){
    html += `<div class="sec-lbl" style="margin-top:${newItems.length?16:0}px">Earlier</div>`;
    oldItems.forEach((f,i) => html += buildCard(f,i+newItems.length));
  }

  list.innerHTML = html;
}

function buildCard(f, i){
  const isPdf = f.ext === "pdf";
  const href  = isPdf
    ? `https://github.com/${GITHUB_USER}/${GITHUB_REPO}/raw/main/${f.path}`
    : `https://${GITHUB_USER}.github.io/${GITHUB_REPO}/${f.path}`;
  const target = isPdf ? ' target="_blank" rel="noopener"' : ' target="_blank"';

  return `<a class="update-card ${f.type}" href="${href}"${target} style="animation-delay:${i*0.04}s">
    <div class="card-head">
      <div>
        <span class="card-type-badge ${f.type}">${f.type==="assignment"?"Assignment":"New Material"}</span>
      </div>
      ${f.isNew ? '<span class="new-badge">NEW</span>' : ""}
    </div>
    <div class="card-title">${f.code ? f.code+" &mdash; " : ""}${f.title}</div>
    <div class="card-meta">
      <span class="card-dept">${f.dept}</span>
      <span>${f.date ? timeAgo(f.date) : ""}</span>
    </div>
    <div class="card-footer">
      <span style="font-size:0.68rem;color:var(--text-soft)">${isPdf?"PDF Document":"HTML Material"}</span>
      <span class="open-btn ${f.ext}">${isPdf ? "Open PDF" : "Open &rarr;"}</span>
    </div>
  </a>`;
}

fetchUpdates();
</script>
</body>
</html>
